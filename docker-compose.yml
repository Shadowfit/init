version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shadowfit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      # MySQL 전용 헬스체크로 복구
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shadowfit-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowfit-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6565:6565"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: shadowfit-mysql
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      JWT_SECRET: ${JWT_SECRET:-shadowfit-prod-secret-key-change-this}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shadowfit-net

  ai-server:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: shadowfit-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8585:8585"
    environment:
      DEBUG: "false"
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      POSE_MODEL_COMPLEXITY: 1
      BACKEND_URL: http://shadowfit-backend:8080/api/v1
    healthcheck:
      # AI 서버용 파이썬 방식 헬스체크 적용 (curl 대신)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # 서버 기동 대기 시간 추가
    networks:
      - shadowfit-net

networks:
  shadowfit-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local