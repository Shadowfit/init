version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shadowfit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # docker-entrypoint-initdb.d 는 파일을 알파벳 순으로 실행 — data.sql이 schema.sql보다
      # 먼저 실행되면 안 되므로(테이블 구조 없이 INSERT 불가) 01-/02- 접두어로 순서 강제.
      # (data.sql은 순수 시드 INSERT만 담당, CREATE TABLE은 schema.sql이 전담)
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./mysql/data.sql:/docker-entrypoint-initdb.d/02-data.sql
      - ./mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --innodb-buffer-pool-size=2G
      --innodb-sort-buffer-size=64M
    healthcheck:
      # MySQL 전용 헬스체크로 복구
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shadowfit-net

  shadowfit-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowfit-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6565:6565"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
      DB_HOST: shadowfit-mysql
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      AI_SERVER_HOST: shadowfit-ai
      AI_SERVER_GRPC_PORT: 8585
      AI_SERVER_HTTP_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-shadowfit-prod-secret-key-change-this}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shadowfit-net

  shadowfit-ai:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: shadowfit-ai
    restart: unless-stopped
    # 분기 H2 (프론트 → AI 직결) 채택. HTTP 8000 은 InternalAuthMiddleware
    # (app/middleware/auth.py) 도입 후 외부 노출 복귀. gRPC 8585 는 Spring 만
    # 같은 도커 네트워크에서 호출하므로 expose 로 유지 (외부 노출 X).
    ports:
      - "8000:8000"
    expose:
      - "8585"
    environment:
      DEBUG: "false"
      TZ: Asia/Seoul
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      POSE_MODEL_COMPLEXITY: 1
      BACKEND_URL: http://shadowfit-backend:8080/api/v1
    healthcheck:
      # AI 서버용 파이썬 방식 헬스체크 적용 (curl 대신)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # 서버 기동 대기 시간 추가
    networks:
      - shadowfit-net

networks:
  shadowfit-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local