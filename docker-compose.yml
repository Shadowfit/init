version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shadowfit-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ./mysql/data.sql:/docker-entrypoint-initdb.d/data.sql
      - ./mysql/my.cnf:/etc/mysql/conf.d/charset.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
      --innodb-buffer-pool-size=2G
      --innodb-sort-buffer-size=64M
    healthcheck:
      # MySQL 전용 헬스체크로 복구
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - shadowfit-net

  shadowfit-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shadowfit-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "6565:6565"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      TZ: Asia/Seoul
      DB_HOST: shadowfit-mysql
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      AI_SERVER_HOST: shadowfit-ai
      AI_SERVER_GRPC_PORT: 8585
      AI_SERVER_HTTP_PORT: 8000
      JWT_SECRET: ${JWT_SECRET:-shadowfit-prod-secret-key-change-this}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - shadowfit-net

  shadowfit-ai:
    build:
      context: ./ai-server
      dockerfile: Dockerfile
    container_name: shadowfit-ai
    restart: unless-stopped
    # HTTP(8000)/gRPC(8585) 포트는 외부에 노출하지 않는다. Spring(같은 Docker
    # 네트워크)이 컨테이너명으로 직접 접근하면 충분하며, HTTP 엔드포인트는
    # 현재 무인증이라 외부 노출 시 임의 데이터 주입이 가능해 막아둔다.
    expose:
      - "8000"
      - "8585"
    environment:
      DEBUG: "false"
      TZ: Asia/Seoul
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN}
      POSE_MODEL_COMPLEXITY: 1
      BACKEND_URL: http://shadowfit-backend:8080/api/v1
    healthcheck:
      # AI 서버용 파이썬 방식 헬스체크 적용 (curl 대신)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # 서버 기동 대기 시간 추가
    networks:
      - shadowfit-net

networks:
  shadowfit-net:
    driver: bridge

volumes:
  mysql_data:
    driver: local