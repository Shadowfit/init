spring.application.name=shadowfit

# [SWAGGER]
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# [HikariCP]
spring.datasource.hikari.initialization-fail-timeout=30000
spring.datasource.hikari.connection-timeout=30000
# maximum-pool-size=10 은 Spring Boot 기본값과 우연히 같은 게 아니라, 실측 후 의도적으로
# 유지하는 값 — pool 10->30 재생성 실측 결과 RPS 개선 0(오히려 저~중 동시성에서 악화),
# 천장은 풀이 아니라 물리 2코어 박스 자체였음. HikariCP 스위트스폿(물리코어x2+1≈5)
# 기준으로도 10은 이미 위쪽. (docs/decisions/pose-ingest-downsampling.md §5-1(5))
spring.datasource.hikari.maximum-pool-size=10

# [SQL Init & JPA]
# ?? SQL ??? ?? JPA ?? ?? ??? ????? ?????.
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# [Logging]
logging.level.root=${LOG_LEVEL_ROOT:INFO}

# [DB Connection / JWT]
# datasource, jwt 등 환경별 설정은 application.yml(dev/prod 프로파일)에서 관리
# 여기에 절대 다시 넣지 말 것 - properties가 yml을 덮어써서 dev 설정이 무시됨

# security.whitelist는 application.yml에서만 관리 (indexed properties가 yml list를
# 통째로 덮어써서 여기 있으면 yml 수정이 반영 안 됨 — 위와 동일한 이유로 여기 넣지 말 것.
# /internal/** 항목은 이미 gRPC(ExerciseGrpcService)로 통합된 죽은 REST 경로라 삭제.)