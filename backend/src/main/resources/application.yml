spring:
  application:
    name: shadowfit
  profiles:
    active: prod

  # [1] 데이터베이스 및 JPA 설정 (spring 하위로 정렬)
  datasource:
    url: jdbc:mysql://shadowfit-mysql:3306/shadowfit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:shadowfit}
    password: ${DB_PASSWORD:shadowfit}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc.batch_size: 100
        order_inserts: true
        order_updates: true
        batch_versioned_data: true

# [2] gRPC 설정 (최상단 레벨)
grpc:
  port: 6565
  server:
    port: 6565
    reflection-enabled: true
  client:
    fastapi-client: # @GrpcClient("fastapi-client")와 일치
      address: 'static://ai-server:8585' # 컨테이너명:AI서버gRPC포트
      negotiation-type: plaintext

# [3] Swagger 및 기타 설정 (최상단 레벨)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  whitelist:
    - "/"
    - "/error"
    - "/v3/api-docs/**"
    - "/swagger-ui/**"
    - "/member/login"
    - "/member/signup"
    - "/ws/**"

jwt:
  secret: ${JWT_SECRET}
  expiration_time: ${JWT_EXPIRATION_TIME:86400}
  refresh_expiration_time: ${JWT_REFRESH_EXPIRATION_TIME:604800}

internal:
  api:
    token: ${INTERNAL_API_TOKEN}

ai-server:
  url: http://shadowfit-ai:8000

# [4] 로깅 설정 (최상단 레벨)
logging:
  level:
    root: INFO
    com.shadowfit: DEBUG
    io.github.lognet.grpc: DEBUG
    net.devh: DEBUG