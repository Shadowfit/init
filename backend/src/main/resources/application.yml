spring:
  application:
    name: shadowfit
  profiles:
    active: prod

  # 시간대 — 한국 전용 서비스 (협의 안건 #16, 갱신 15)
  # LocalDateTime 직렬화 형식 — § 12.5 결정과 정합 ("2026-05-28T10:00:03", timezone 마커 없음)
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

  # [1] 데이터베이스 및 JPA 설정 (spring 하위로 정렬)
  datasource:
    # rewriteBatchedStatements=true: JDBC 드라이버가 batch INSERT 를 multi-row SQL 한 방으로 재작성 (부하테스트 §7.5 개선)
    url: jdbc:mysql://${DB_HOST:shadowfit-mysql}:${DB_PORT:3306}/${DB_NAME:shadowfit}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&rewriteBatchedStatements=true
    username: ${DB_USERNAME:shadowfit}
    password: ${DB_PASSWORD:shadowfit}
    driver-class-name: com.mysql.cj.jdbc.Driver

  sql:
    init:
      mode: always

  jpa:
     hibernate:
       ddl-auto: none # 혹은 none (도커에서 schema.sql을 실행하므로)
     defer-datasource-initialization: true
     properties:
       hibernate:
         jdbc:
           batch_size: 25      # saveAll 을 batch 로 묶음 (부하테스트 §7.5 개선)
         order_inserts: true
         order_updates: true

  # [1.5] 로컬 캐시 (Caffeine) — feedbackTemplates: 쓰기 경로 없는 카탈로그성 데이터, 1시간은
  # 히트율 손해 목적이 아니라 미래에 관리자 CRUD 생기고 @CacheEvict 깜빡해도 자동 복구되는 안전판.
  # exercises: 쓰기 경로 있음(AdminExerciseService.updateThresholds) — @CacheEvict로 무효화,
  # findByIdCached(읽기 전용)만 캐시 타고 findById(쓰기 경로)는 캐시 미적용 유지.
  # exerciseReferences: 쓰기 경로(saveReferencePoses, 신규 운동 등록 시만)가 조회 메서드를
  # 재사용하지 않아 detached 엔티티 함정 없음 — findByExerciseId에 직접 @Cacheable, evict만 병행.
  cache:
    type: caffeine
    cache-names: feedbackTemplates,exercises,exerciseReferences # 시작 시 미리 등록 — 안 하면 Micrometer 가 지연생성 캐시를 못 잡음
    caffeine:
      spec: expireAfterWrite=1h,maximumSize=500,recordStats

# [2] gRPC 설정 (최상단 레벨)
grpc:
  port: 6565
  server:
    port: 6565
    reflection-enabled: true
  client:
    fastapi-client: # @GrpcClient("fastapi-client")와 일치
      address: 'static://shadowfit-ai:8585' # 컨테이너명:AI서버gRPC포트
      negotiation-type: plaintext

# [3] Swagger 및 기타 설정 (최상단 레벨)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

security:
  whitelist:
    - "/"
    - "/error"
    - "/v3/api-docs/**"
    - "/swagger-ui/**"
    - "/member/login"
    - "/member/signup"
    - "/ws/**"
    - "/actuator/**"

# [6] Actuator — 캐시 히트율 관측용 (caches/metrics 만 노출, health 는 기본)
management:
  endpoints:
    web:
      exposure:
        include: health,caches,metrics

jwt:
  secret: ${JWT_SECRET}
  expiration_time: ${JWT_EXPIRATION_TIME:86400}
  refresh_expiration_time: ${JWT_REFRESH_EXPIRATION_TIME:604800}

internal:
  api:
    token: ${INTERNAL_API_TOKEN}

ai-server:
  url: ${AI_SERVER_URL:http://shadowfit-ai:8000}

# [5] 운동 세션 타임아웃 설정
exercise:
  session:
    timeout:
      # 예상 운동시간 + 버퍼(분)로 총 타임아웃 시간 결정
      # 예: 스쿼트 예상시간 15분 + 30분 버퍼 = 45분 타임아웃
      default-buffer-minutes: 30
      # 스케줄러 체크 간격(분) - 매 1분마다 체크
      check-interval-minutes: 1

# [4] 로깅 설정 (최상단 레벨)
logging:
  level:
    root: INFO
    com.shadowfit: DEBUG
    io.github.lognet.grpc: DEBUG
    net.devh: DEBUG
    org.springframework.jdbc.datasource.init: DEBUG # SQL 초기화 로그 확인용