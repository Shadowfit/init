spring:
  application:
    name: shadowfit
  profiles:
    active: prod

# [1] 공통 설정
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.shadowfit: DEBUG

# [중요] 모든 환경에서 공통으로 사용할 화이트리스트를 여기에 두거나, 아래 prod 섹션에 넣어야 합니다.
security:
  whitelist:
    - "/"
    - "/error"
    - "/favicon.ico"
    - "/v3/api-docs"
    - "/v3/api-docs/"
    - "/v3/api-docs/**"
    - "/swagger-ui/**"
    - "/swagger-ui.html"
    - "/api-docs/**"
    - "/swagger-resources/**"
    - "/webjars/**"
    - "/member/login"
    - "/member/signup"
    - "/css/**"
    - "/js/**"
    - "/img/**"
    - "/ws/**"

---
# [2] 운영 환경 (Docker / Production)
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://shadowfit-mysql:3306/shadowfit?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:shadowfit}
    password: ${DB_PASSWORD:shadowfit}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

        jdbc.batch_size: 100
        order_inserts: true        # insert 문을 정렬해서 배치를 최적화
        order_updates: true        # update 문도 정렬해서 배치 최적화
        batch_versioned_data: true # 데이터 버전 관리 시에도 배치 적용
jwt:
  secret: ${JWT_SECRET}
  expiration_time: ${JWT_EXPIRATION_TIME:86400}
  refresh_expiration_time: ${JWT_REFRESH_EXPIRATION_TIME:604800}

internal:
  api:
    token: ${INTERNAL_API_TOKEN}

ai-server:
  url: http://shadowfit-ai:8000