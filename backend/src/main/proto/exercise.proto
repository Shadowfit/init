syntax = "proto3";

// 자바 빌드 시 개별 클래스 파일로 생성하도록 설정
option java_multiple_files = true;
// 프로젝트 패키지 경로에 맞게 수정 가능
option java_package = "com.shadowfit.grpc";
// 외부 클래스 이름 설정
option java_outer_classname = "ExerciseProto";

// [Service] 운동 분석 및 데이터 전송 서비스 정의
service ExerciseService {

  // 1. 분석 시작 요청 (Spring -> FastAPI)
  // 사용자가 운동 시작 버튼을 누르면 스프링이 FastAPI에 분석을 지시합니다.
  rpc StartAnalysis (AnalyzeRequest) returns (AnalyzeResponse);

  // 2. 최종 결과 조회 (Spring -> FastAPI)
  // 분석 완료 후 저장된 최종 포즈 데이터 리스트를 가져옵니다.
  rpc GetFinalPoseData (SessionRequest) returns (PoseDataList);

  // 3. 분석 결과 배치 저장 (FastAPI -> Spring)
  // FastAPI가 분석 중인 포즈 데이터 뭉치(Batch)를 스프링에 전송하여 DB에 저장합니다.
  rpc SavePoseDataBatch (PoseDataBatchRequest) returns (PoseDataResponse);
}

// ------------------------------------------------------------
// 1. 분석 시작 관련 메시지
// ------------------------------------------------------------

message AnalyzeRequest {
  int64 exercise_id = 1;     // 운동 종류 ID
  string youtube_id = 2;     // 분석할 유튜브 영상 ID
  int64 session_id = 3;      // 생성된 운동 세션 ID
}

message AnalyzeResponse {
  bool success = 1;          // 요청 수락 여부
}

// ------------------------------------------------------------
// 2. 세션 조회 관련 메시지
// ------------------------------------------------------------

message SessionRequest {
  int64 session_id = 1;      // 조회할 세션 ID
}

message PoseDataList {
  // 여러 개의 포즈 응답 데이터를 담는 리스트
  repeated PoseDataResponse pose_data = 1;
}

// ------------------------------------------------------------
// 3. 데이터 저장(Batch) 관련 메시지
// ------------------------------------------------------------

// 개별 포즈 데이터의 상세 정보
message PoseDataRequest {
  double timestamp_sec = 1;     // 영상 내 시간대 (초)
  string joint_coordinates = 2; // 관절 좌표 (JSON 문자열 형태)
}

// 여러 포즈 데이터를 한 번에 묶어서 보내는 요청
message PoseDataBatchRequest {
  int64 session_id = 1;         // 해당 데이터를 저장할 세션 ID
  repeated PoseDataRequest pose_data = 2; // 포즈 데이터 리스트 (Batch)
}

// 전송 결과에 대한 응답
message PoseDataResponse {
  bool success = 1;             // 저장 성공 여부
  int64 session_id = 2;         // 확인용 세션 ID
  double timestamp_sec = 3;      // (선택) 마지막으로 처리된 타임스탬프
  string joint_coordinates = 4;  // (선택) 마지막으로 처리된 좌표 데이터
}